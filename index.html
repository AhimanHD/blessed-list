<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLESSED_LIST - Challenge List</title>
    <style>
        :root {
            --nav-green: #1b4322;
            --neon-blue: #00f0ff;
            --dark-bg: #111827;
            --text-main: #333333;
            --text-muted: #666666;
            --sidebar-width: 250px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9fafb;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Top Navigation --- */
        nav {
            background-color: var(--nav-green);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-weight: bold;
        }

        .nav-left .brand { 
            font-size: 1.2rem; 
            margin-right: 15px; 
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            letter-spacing: 0.5px;
        }
        
        .nav-left .version { font-size: 0.8rem; opacity: 0.8; font-weight: normal; color: white; }
        .nav-center a { color: white; text-decoration: none; margin: 0 15px; font-size: 0.9rem; opacity: 0.9; }
        .nav-center a.active { text-decoration: underline; }
        
        .submit-btn {
            background: white;
            color: var(--nav-green);
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #f3f4f6; }

        /* --- Main Layout Split --- */
        .container { display: flex; flex: 1; overflow: hidden; }

        .left-sidebar { width: var(--sidebar-width); border-right: 1px solid #e5e7eb; overflow-y: auto; background: white; }
        
        .level-item { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f3f4f6; font-size: 0.9rem; }
        .level-item:hover { background-color: #f3f4f6; }
        
        .level-item.active { 
            background-color: rgba(0, 240, 255, 0.05); 
            border: 2px solid var(--neon-blue);
            font-weight: bold; 
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }
        .level-rank { width: 40px; color: var(--text-muted); font-weight: bold; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; background: white; display: flex; flex-direction: column; align-items: center; }
        .level-details-card { width: 100%; max-width: 600px; }
        .level-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        .meta-info { margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5; }
        .meta-info span { font-weight: bold; }
        
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            background: #000; 
            border-radius: 4px; 
            margin-bottom: 20px; 
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .stats-grid { display: flex; justify-content: space-between; text-align: center; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 20px; }
        .stat-box h4 { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .stat-box p { font-size: 1.1rem; font-weight: bold; }
        
        .stat-box.points-value p {
            color: var(--neon-blue);
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.4);
        }

        .right-sidebar { width: 300px; border-left: 1px solid #e5e7eb; padding: 20px; overflow-y: auto; background: white; font-size: 0.85rem; }
        .right-sidebar h3 { font-size: 1rem; margin-bottom: 10px; border-bottom: 1px solid #e5e7eb; padding-bottom: 5px; margin-top: 20px; }
        .right-sidebar h3:first-of-type { margin-top: 0; }
        .right-sidebar ul { list-style: none; }
        .right-sidebar li { margin-bottom: 8px; line-height: 1.4; }

        /* --- Submission Modal Popup --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: white; padding: 25px; border-radius: 8px;
            width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-box h2 { margin-bottom: 15px; font-size: 1.4rem; color: var(--text-main); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; color: var(--text-muted); }
        .form-group input, .form-group select {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem;
        }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #e5e7eb; color: #333; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; }
        .btn-submit { background: var(--nav-green); color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

        <div class="nav-left">

            <span class="version">v1.0</span>
        </div>
        <div class="nav-center">

        <div class="nav-right">
            <button class="submit-btn" id="openModalBtn">Submit Level</button>
        </div>

    <div class="container">
        <div class="left-sidebar" id="levelList"></div>
        <div class="main-content">
            <div class="level-details-card" id="levelDetails"></div>

        <div class="right-sidebar">
            <p style="color:var(--text-muted); margin-bottom: 15px;">Website layout inspired by TheShittyList.</p>

            <ul><li>👑 Puremidnight402</li><li>👑 Puremidnight</li></ul>
            <h3>Submission Requirements</h3>
            <ul>
                <li>• Level <strong>must</strong> be under 30 seconds.</li>

    <div class="modal-overlay" id="submissionModal">

                <div class="form-group">

                </div>
                <div class="form-group">
                    <label>Verifier</label>

                <div class="form-group">

                    <input type="text" id="lvlYoutube" required placeholder="e.g., dQw4w9WgXcQ">
                </div>
                <div class="form-group">
                    <label>Points Provided</label>
                    <input type="number" id="lvlPoints" value="200" required>
                </div>
                <div class="form-group">
                    <label>Level ID</label>
                    <input type="text" id="lvlId" required placeholder="Geometry Dash ID">
                </div>
                <div class="form-group">
                    <label>Method</label>
                    <select id="lvlMethod">
                        <option value="Alternating">Alternating</option>
                        <option value="Standard">Standard</option>
                        <option value="Spam">Spam</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" id="closeModalBtn">Cancel</button>
                    <button type="submit" class="btn-submit" id="submitBtnText">Send Submission</button>
                </div>
            </form>
        </div>
    </div>
